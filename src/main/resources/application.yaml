spring:
  application:
    name: localmate-ai

  config:
    import: optional:file:.env[.properties]

  datasource:
    url: jdbc:postgresql://localhost:5432/localmate
    username: localmate
    password: localmate
    driver-class-name: org.postgresql.Driver

  ai:
    model:
      chat: google-genai

    google:
      genai:
        api-key: ${GOOGLE_API_KEY}
        chat:
          model: gemini-3.1-flash-lite
          temperature: 0.7

    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always

server:
  port: 8080

logging:
  level:
    org.springframework.ai.chat.client.advisor: DEBUG